<!DOCTYPE html>
<html>
<head>
    <title>Finding Recruiter...</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid #ddd;
            border-top: 8px solid #0077b5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .message {
            margin-top: 20px;
            font-size: 18px;
            color: #444;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="spinner"></div>

    <div class="message">
        Searching for the best LinkedIn contact...
    </div>

</body>
</html>
