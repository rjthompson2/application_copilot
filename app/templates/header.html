<!-- templates/header.html -->
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>

<header class="app-header">
    <div class="header-left">
        <h1 class="logo">Job Matcher</h1>
    </div>

    <div class="header-right">
        <button class="nav-btn" onclick="goHome()">
            Home
        </button>

        <button class="nav-btn refresh-btn" id="refreshBtn" onclick="refreshJobs()">
            <span id="refreshText">Refresh Jobs</span>

            <span id="spinner" class="spinner hidden"></span>
        </button>

        <button class="nav-btn history-btn" onclick="goHistory()">
            History
        </button>

        <button class="nav-btn settings-btn" onclick="goSettings()">
            Settings
        </button>
    </div>
</header>

<script>
    function goHome() {
        window.location.href = "/";
    }

    async function refreshJobs() {
        const refreshBtn = document.getElementById("refreshBtn");
        const spinner = document.getElementById("spinner");
        const refreshText = document.getElementById("refreshText");

        refreshBtn.classList.add("loading");
        spinner.classList.remove("hidden");

        refreshText.innerText = "Refreshing...";

        // Your backend endpoint
        await fetch("/load", {
            method: "POST"
        });

        const poll = setInterval(async () => {

            const response = await fetch("/load/status");
            const data = await response.json();

            if (data.success) {

                clearInterval(poll);

                spinner.classList.add("hidden");
                refreshBtn.classList.remove("loading");


                setTimeout(() => {
                    refreshText.innerText = "Refresh Jobs";
                }, 1500);
            }

        }, 1000);
    }

       
    function goHistory() {
        window.location.href = "/history";
    }

    function goSettings() {
        window.location.href = "/settings";
    }
</script>
